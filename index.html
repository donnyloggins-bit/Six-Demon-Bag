<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Six Demon Bag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a class="nav__logo" href="#">SDB</a>
      <div class="nav__links">
        <a href="#listen">Stream</a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <img class="hero__img" src="assets/hero-bg.jpg" alt="" aria-hidden="true" />
    <div class="hero__overlay" aria-hidden="true"></div>
    <div class="hero__content">
      <h1 class="hero__title">SIX<br/>DEMON<br/>BAG</h1>

      <!-- PLAYER -->
      <div class="player" id="player">
        <div class="player__track" id="player-title">Dirty Old Town</div>
        <div class="player__row">
          <button class="player__btn" id="play-btn" aria-label="Play / Pause">
            <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
          </button>
          <div class="player__bar">
            <div class="player__progress" id="progress-track">
              <div class="player__fill" id="progress-fill"></div>
            </div>
            <span class="player__time" id="player-time">--:--</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- IMAGE BREAK 1 -->
  <div class="img-break">
    <img src="assets/skull.png" alt="" aria-hidden="true" />
  </div>

  <!-- IMAGE BREAK 2 -->
  <div class="img-break img-break--right">
    <img src="assets/mask.jpg" alt="" aria-hidden="true" />
  </div>

  <!-- STREAM -->
  <section class="listen" id="listen">
    <div class="listen__platforms">
      <a class="platform-btn" href="#">Spotify</a>
      <a class="platform-btn" href="#">Apple Music</a>
      <a class="platform-btn" href="#">SoundCloud</a>
      <a class="platform-btn" href="#">Bandcamp</a>
    </div>
  </section>

  <!-- IMAGE BREAK 3 -->
  <div class="img-break">
    <img src="assets/hellgate.jpg" alt="" aria-hidden="true" />
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <span class="footer__logo">SIX DEMON BAG</span>
    <span class="footer__copy">&copy; 2026</span>
  </footer>

  <script>
    window.__SDB_TRACKS__ = [
      { name: "Dirty Old Town", src: "assets/dirty-old-town.m4a" }
    ];
  </script>
  <script src="script.js"></script>
</body>
</html>
